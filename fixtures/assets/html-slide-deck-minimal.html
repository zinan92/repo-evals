<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Minimal Slide Deck Fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
    .slide { min-height: 90vh; padding: 4rem; border-bottom: 1px solid #ddd; }
    .slide h1 { font-size: 2.5rem; }
    .slide p { font-size: 1.25rem; max-width: 40rem; }
  </style>
</head>
<body>
  <section class="slide" id="slide-1">
    <h1>Slide 1 — Title</h1>
    <p>Minimal synthetic fixture for HTML slide pipelines.</p>
  </section>
  <section class="slide" id="slide-2">
    <h1>Slide 2 — Body</h1>
    <p>Three slides, no external assets, no JavaScript.</p>
  </section>
  <section class="slide" id="slide-3">
    <h1>Slide 3 — Close</h1>
    <p>End of deck.</p>
  </section>
</body>
</html>
