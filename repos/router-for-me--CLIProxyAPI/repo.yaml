notes: 'Go 1.26 proxy server that wraps Gemini CLI / Antigravity / ChatGPT

  Codex / Claude Code as OpenAI / Gemini / Claude / Codex compatible

  HTTP APIs. 30,477 stars, MIT, very active. v6.10.4 ships 8 release

  artefacts (darwin / freebsd / linux / windows × aarch64 + amd64).

  No public-internet endpoints by default — runs locally and exposes

  the API for downstream clients.


  7 internal translators (antigravity, claude, codex, common,

  gemini-cli, gemini, openai). 7 OAuth login flows (antigravity,

  claude, codex, gemini, kimi, vertex, plus an `empty` placeholder).

  Reusable Go SDK at sdk/ with 9 sub-packages and 4 doc files in

  EN+CN. config.example.yaml is 406 lines — substantial knob surface.


  Wendy already has a CLIProxyAPI install per memory record (token

  refresh notes at localhost:8317). This eval is independent

  static-only.

  '
product_view:
  one_liner:
    en: A Go proxy server that wraps your Gemini CLI / Antigravity / ChatGPT Codex
      / Claude Code OAuth sessions as OpenAI / Gemini / Claude / Codex compatible
      HTTP APIs — multi-account round-robin, function calling, multimodal, streaming,
      and a reusable Go SDK to embed it. 8-platform binaries, MIT, very actively developed.
    zh: 一个 Go 代理服务器：把你已经登录的 Gemini CLI / Antigravity / ChatGPT Codex / Claude Code
      会话包装成 OpenAI / Gemini / Claude / Codex 兼容的 HTTP API。多账号轮询、函数调用、多模态、流式、还有可嵌入的
      Go SDK。8 平台二进制，MIT，更新非常活跃。
  persona:
    en: |-
      A developer who already pays for Claude Code / Codex / Gemini CLI and wants those subscriptions reusable as OpenAI-compatible HTTP endpoints — for their own local tools, a custom dashboard, automation scripts, or a self-hosted IDE plugin. Comfortable running a Go binary locally.
    zh: |-
      已经在为 Claude Code / Codex / Gemini CLI 付订阅费的开发者,想把这些订阅复用成 OpenAI 兼容的 HTTP 端点 —— 给自己本地工具 / 定制 dashboard / 自动化脚本 / 自托管 IDE 插件用。本机能跑 Go 二进制。
  scenario:
    en: |-
      You have a working CLI subscription. Your other code wants to call "Claude" but expects the OpenAI API shape. Or your token expired. Or you want round-robin across 3 personal accounts so heavy work doesn't burn one quota. You don't want to write a wrapper for each provider.
    zh: |-
      你有可用的 CLI 订阅。但你别的代码想调"Claude",而它期待 OpenAI API 形状。或者 token 过期了。或者你想 3 个个人账号轮询,不让重活把一个配额烧光。你不想给每家 provider 写一遍 wrapper。
  without_this:
    en: |-
      Three options. (1) Buy each provider's API access separately (Anthropic API + OpenAI API + Google AI), pay double for the same models you already pay CLI subscriptions for. (2) Hand-write a wrapper per provider per app — every CLI session expiry breaks something. (3) Use third-party relay services (Packy / AICodeMirror / etc.) — costs money + gives them your traffic.
    zh: |-
      三条路。(1) 各家 API 单独再买一次(Anthropic API + OpenAI API + Google AI),已经在付 CLI 订阅,这相当于付双份。(2) 每家 provider 每个应用各写一份 wrapper —— CLI session 一过期就坏一处。(3) 用第三方中继服务(Packy / AICodeMirror 等) —— 要钱 + 流量给他们。
  with_this:
    en: |-
      One Go binary. Run it locally on your machine, point your other tools at `localhost:8317`, they think they're talking to OpenAI. Behind it: round-robin across your CLI sessions (Claude Code / Codex / Gemini / Antigravity), token refresh, function calling, multimodal, streaming. 8 OS/arch binaries pre-built; MIT; v6.10.4, 30K stars, very actively maintained.
    zh: |-
      一个 Go 二进制。本机跑,把其他工具指向 `localhost:8317`,它们以为自己在跟 OpenAI 说话。后面是: CLI session 轮询(Claude Code / Codex / Gemini / Antigravity)、token 刷新、function calling、多模态、流式。8 OS/arch 预编译二进制;MIT;v6.10.4,30K stars,持续维护。
  cost_summary:
    en: |-
      MIT, free. Reuses CLI subscriptions you already pay for — no new API keys for the wrapped providers. Optional providers (Kimi / Vertex) need their own keys. No external services required at runtime. Token storage at `./auths/` — keep local. Self-hosted, no telemetry.
    zh: |-
      MIT 免费。复用你已经在付的 CLI 订阅 —— 包装的 provider 不需要新 API key。可选的 Kimi / Vertex 走它们自己的 key。运行时不需要外部服务。Token 存 `./auths/` —— 本地保管。自托管 / 无遥测。
  watch_out:
    en: |-
      README is heavy on sponsored relay services (PackyCode / AICodeMirror / BmoPlus / Poixe AI / VisionCoder / Z.ai) — those are sponsorships, not features. The OSS proxy itself is independent. The proxy forwards your authenticated CLI sessions through code you don't fully audit line-by-line — fine for localhost; pin the version + audit before piping production traffic. `auths/` directory contains live OAuth tokens — don't sync to cloud.
    zh: |-
      README 大段是赞助内容(PackyCode / AICodeMirror / BmoPlus / Poixe AI / VisionCoder / Z.ai)—— 那是赞助,不是功能。开源代理本身跟这些服务无关。代理转发你已登录的 CLI session,代码你不会逐行审 —— 本机自用没问题;给生产流量代理前要锁版本 + 审代码。`auths/` 目录有活的 OAuth token —— 别同步到云盘。
  examples:
  - context:
      en: |-
        An indie dev with Claude Code subscription building a custom code-review CLI that expects OpenAI's API
      zh: |-
        有 Claude Code 订阅的独立开发者,在做一个自用代码 review CLI,但它期待 OpenAI API
    you_say:
      en: |-
        Run cliproxy on localhost:8317 forwarding to my Claude Code session, then point my code-review CLI at OPENAI_BASE_URL=http://localhost:8317
      zh: |-
        在 localhost:8317 跑 cliproxy 转发到我的 Claude Code session,然后把代码 review CLI 的 OPENAI_BASE_URL 指过去
    what_happens:
      en: |-
        cliproxy listens on :8317. Your code-review CLI sends OpenAI-shaped chat completion requests. cliproxy translates to Claude protocol, forwards through your CLI auth, returns OpenAI-shaped responses. Your CLI works without knowing anything changed.
      zh: |-
        cliproxy 监听 :8317。你的代码 review CLI 发 OpenAI 形状的 chat completion 请求。cliproxy 翻译成 Claude 协议,通过 CLI 鉴权转发,返回 OpenAI 形状的响应。你的 CLI 不知道有任何变化照常工作。
  - context:
      en: |-
        A heavy user who has 3 personal Claude accounts (work / personal / experimentation) and wants automatic round-robin so no single account hits its rate limit
      zh: |-
        重度用户有 3 个个人 Claude 账号(工作 / 个人 / 实验),想自动轮询,任何一个都不要先撞 rate limit
    you_say:
      en: |-
        Configure cliproxy with all 3 Claude OAuth sessions, round-robin mode
      zh: |-
        把 3 个 Claude OAuth session 都配进 cliproxy,启用 round-robin
    what_happens:
      en: |-
        cliproxy round-robins each request to a different account. When one account hits rate limit, it auto-skips. Aggregate throughput is 3x; no client code change.
      zh: |-
        cliproxy 把每个请求轮流分给不同账号。某个账号撞 rate limit 时自动跳过。总吞吐 3 倍;客户端代码不改。
  - context:
      en: |-
        A Go developer building a self-hosted SaaS that needs LLM calls, but doesn't want to bake provider-specific code into the product
      zh: |-
        Go 开发者做自托管 SaaS,需要调 LLM,不想把 provider 相关代码塞进产品代码
    you_say:
      en: |-
        Embed the cliproxy SDK inside my Go service so I can swap providers via config
      zh: |-
        在我的 Go 服务里嵌入 cliproxy SDK,通过配置切 provider
    what_happens:
      en: |-
        9-package Go SDK is imported. Your service exposes a single LLM interface to its own code; under the hood the SDK routes to whichever provider's CLI session is configured. Provider switch is a config change, not a code change.
      zh: |-
        引入 9 个 package 的 Go SDK。你的服务对自己代码暴露单一 LLM 接口;底下 SDK 根据配置路由到对应 provider 的 CLI session。换 provider 改配置,不改代码。
