workflow_diagram:
  layout: linear
  why_layer: |
    Molecule — fixed pipeline of (incoming HTTP request → protocol
    translation → CLI session forwarding → response translation →
    HTTP response). The user picks providers + accounts via config;
    inside the pipeline, no LLM decides routing — the proxy follows
    the config strictly. Round-robin / failover is deterministic
    rule-based, not LLM-decided.
  nodes:
  - id: client
    type: start
    rank: 0
    lane: 0
    label:
      en: |-
        Your tool / IDE
        (OpenAI-shaped request)
      zh: |-
        你的工具 / IDE
        (OpenAI 形状请求)
  - id: parse
    type: atom
    rank: 1
    lane: 0
    label:
      en: |-
        HTTP listener + parse
        (OpenAI / Gemini / Claude)
      zh: |-
        HTTP 监听 + 解析
        (OpenAI / Gemini / Claude)
  - id: rotate
    type: atom
    rank: 2
    lane: 0
    label:
      en: |-
        Account rotator
        (round-robin / failover)
      zh: |-
        账号调度
        (轮询 / 故障切换)
  - id: forward
    type: atom
    rank: 3
    lane: 0
    label:
      en: |-
        Provider forward
        (Claude / Codex / Gemini CLI)
      zh: |-
        Provider 转发
        (Claude / Codex / Gemini CLI)
  - id: translate
    type: atom
    rank: 4
    lane: 0
    label:
      en: |-
        Response translator
        (back to client format)
      zh: |-
        响应翻译
        (转回客户端格式)
  - id: out
    type: end
    rank: 5
    lane: 0
    label:
      en: |-
        OpenAI-shaped response
        (your tool consumes)
      zh: |-
        OpenAI 形状响应
        (你的工具消费)
  edges:
  - from: client
    to: parse
  - from: parse
    to: rotate
  - from: rotate
    to: forward
  - from: forward
    to: translate
  - from: translate
    to: out
