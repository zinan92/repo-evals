product_view:
  use_for:
  - en: Xiaohongshu (XHS) creators who want a desktop AI workspace combining browser
      + KB + editor + automation.
    zh: 想要桌面 AI 工作台（浏览器 + 知识库 + 编辑器 + 自动化）一站式做小红书的创作者。
  - en: Comfortable installing a signed DMG / EXE / DEB and configuring your own LLM
      endpoint + key.
    zh: 能装签名 DMG / EXE / DEB、能在 Settings 里配 LLM endpoint + key。
  dont_use_for:
  - en: Don't expect YouTube capture to work — manifest description claims it, but
      host_permissions don't grant *.youtube.com.
    zh: 别指望 YouTube 抓取能用 —— 扩展 description 写了，但 host_permissions 里没 youtube.com。
  - en: Don't run RedClaw automation on a real account without verifying it on a test
      account first.
    zh: 别在真实账号上直接跑 RedClaw 自动化 —— 先在小号验证。
