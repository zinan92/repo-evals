notes: 'Electron desktop AI workspace for Xiaohongshu (小红书) creators. Ships as

  signed DMG / EXE / DEB installers (v1.11.0 at scaffold time). Bundles a

  built-in browser, local knowledge base + retrieval, multi-workspace

  editor, RedClaw automation console (LLM-driven), image generation, and

  scheduled background execution. Source layout: desktop/ (Electron),

  Plugin/ (browser extension), RedBoxweb/ (marketing site).


  Compound-layer eval: the call graph for a RedClaw run is decided at

  runtime by the LLM, so eval is scenario-driven. Each scenario asks the

  user to install the binary, configure an endpoint/key/model, and log

  what they observe.


  Source-readable claims (browser-extension manifest, Electron entry,

  README install steps) can be evaluated statically; the AI workspace

  flows require a real install + provider key.

  '
