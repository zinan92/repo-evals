notes: 'Jesse Vincent''s "complete software-development methodology for coding

  agents" — 14 composable skills (brainstorming / TDD / debugging /

  planning / subagent-driven-development / git-worktrees / etc) plus

  multi-platform install (Claude Code official marketplace, Codex CLI,

  Codex App, Factory Droid, Gemini CLI, OpenCode, Cursor, GitHub Copilot

  CLI). 179K stars, MIT, version 5.1.0, pushed yesterday.


  Mature: 5.x version + RELEASE-NOTES.md + tests/ + hooks/ + scripts/.

  Contributor-facing CLAUDE.md is famous for its blunt "94% PR rejection

  rate" anti-slop guidelines.


  One small finding: AGENTS.md is 0 bytes (empty) and GEMINI.md is only

  2 lines — given the project''s audience IS agents, those docs being

  thin is a polish gap. CLAUDE.md (106 lines) is the real one.


  Compound layer: 14 distinct skills the user can invoke separately —

  "use brainstorming first" / "kick off TDD" / "use writing-plans" —

  multiple independent user-invocable atoms wired by predefined

  install contracts.

  '
product_view:
  one_liner:
    en: A 14-skill methodology bundle that auto-triggers when your coding agent starts
      work — brainstorming, planning, TDD, subagent dispatch, debugging, code review,
      git worktrees.
    zh: 给 coding agent 的 14 个方法论 skill 合集，agent 一开工就自动触发 —— brainstorming / 写计划 /
      TDD / 子 agent 拆活 / 系统性 debug / 代码 review / git worktrees。
  persona:
    en: A solo developer or small-team coder who uses Claude Code (or another agent)
      and feels the agent jumps to writing code without asking enough questions, skips
      writing tests, or produces code that "looks done" but isn't. You don't want
      to be the agent's project manager.
    zh: 用 Claude Code(或其他 agent) 的独立开发者 / 小团队 —— 觉得 agent 不问就动手、不写测试、写出的代码"看起来像完成了但其实没完成"。你不想自己当
      agent 的 PM。
  scenario:
    en: You're about to ask your agent to build something non-trivial — a new auth
      flow, a DB migration, a refactor that touches 5 files. You want it to think
      it through first, not rush to a diff.
    zh: 你要让 agent 做一个不是 5 行能搞定的活 —— 新加一套登录流程、改库表、重构跨 5 个文件的模块。你希望它先想清楚再动手,不是上来就直接 diff。
  without_this:
    en: 'You manually prompt the agent at every stage: "first brainstorm with me",
      "now write the plan", "now write tests first", "now self-review subagent output".
      Each new conversation you re-explain the methodology. The step you forget to
      ask for is the step the agent skips.

      '
    zh: '你得一步一步手动催 agent: "先跟我 brainstorm" → "再写计划" → "再写测试" → "再自检子 agent 输出"。每个新对话都要重讲一遍方法论。你忘记说的那一步,agent
      就会跳过。

      '
  with_this:
    en: '14 methodology skills auto-trigger at the right moment: brainstorming → writing-plans
      → TDD → subagent-driven-development → verification-before-completion → finishing-a-development-branch
      → receiving-code-review. You give the agent one feature ask, and the methodology
      fires itself. You stop being the PM and become the reviewer.

      '
    zh: '14 个方法论 skill 在该触发的时刻自动起效: brainstorming → 写计划 → TDD → 子 agent 拆活 → 完成前自检 → 收尾
      → 接 code review。你只丢一个功能需求,方法论会自己跑。你不再是 PM,只当 reviewer。

      '
  cost_summary:
    en: Free skill (MIT). Cost is on the agent side — 14 skills auto-trigger means
      more tokens consumed per task before any code gets written. Need an existing
      agent harness (Claude Code / Codex / Cursor / Gemini CLI / OpenCode / Factory
      Droid / GitHub Copilot CLI).
    zh: skill 本身免费(MIT)。成本在 agent 这边 —— 14 个 skill 自动触发,每个任务在写代码前要先消耗更多 token。需要已有的 agent
      平台(Claude Code / Codex / Cursor / Gemini CLI / OpenCode / Factory Droid / GitHub
      Copilot CLI)。
  watch_out:
    en: 'Claude Code is the first-class platform — AGENTS.md is empty and GEMINI.md
      is only 2 lines, so non-Claude installs rely on thinner platform-specific configs
      (.codex-plugin / .cursor-plugin / .opencode have 1-2 files each). Verify your
      platform''s plugin contract before relying on it. Maintainer is famously blunt
      about closing "slop PRs" — read CLAUDE.md before contributing.

      '
    zh: 'Claude Code 是一等公民 —— AGENTS.md 空 + GEMINI.md 只有 2 行,Claude 之外的平台靠各自薄一些的配置(.codex-plugin
      / .cursor-plugin / .opencode 每家 1-2 个文件)。依赖前先看你那个平台的 plugin 合约。维护者以"关掉 slop PR"出名,想
      contribute 先读 CLAUDE.md。

      '
  examples:
  - context:
      en: |-
        An indie dev about to add OAuth login to a SaaS side project
      zh: |-
        独立开发者准备给 SaaS 副业项目加 OAuth 登录
    you_say:
      en: |-
        Add GitHub OAuth login to my-saas — users should be able to sign in with their GitHub account
      zh: |-
        给 my-saas 加上 GitHub OAuth 登录,用户可以用 GitHub 账号登入
    what_happens:
      en: |-
        brainstorming auto-fires first — agent asks: "GitHub-only or multi-provider? Where do you want session tokens stored? Is sign-up the same flow as sign-in?" After alignment, writing-plans drafts the implementation plan; TDD writes the failing tests; only then does the agent start writing the route handlers.
      zh: |-
        brainstorming 自动起 —— agent 先反问"只 GitHub 还是多家?session token 存哪?注册和登录走同一流程吗?"。聊清楚后,writing-plans 起草实现计划;TDD 先写失败的测试;然后 agent 才开始写路由 handler。
  - context:
      en: |-
        A small-team developer who's been bitten by half-finished Claude features that "looked done"
      zh: |-
        被 Claude 写出"看起来像完成"的半成品坑过的小团队开发者
    you_say:
      en: |-
        Refactor the inventory service to use the new pricing engine — touch the 5 files in src/inventory and make sure nothing else breaks
      zh: |-
        把 inventory service 改造成用新的 pricing engine,改动 src/inventory 下 5 个文件,别影响其他地方
    what_happens:
      en: |-
        subagent-driven-development fires (decision: this work is big enough to split). The main agent dispatches per-file subagents for the 5 files, each subagent does its own TDD pass, then the main agent reviews each subagent's output before integrating. verification-before-completion runs the full test suite + greps for orphaned references before declaring done.
      zh: |-
        subagent-driven-development 起作用(LLM 判断:这活够大,值得拆)。主 agent 给 5 个文件分别派子 agent,每个子 agent 独立做 TDD,然后主 agent 审核每个子 agent 的产出再合并。verification-before-completion 跑全量测试 + grep 找漏改的引用,通过了才宣布完成。
  - context:
      en: |-
        Same person on Cursor instead of Claude Code, wanting the methodology to follow them
      zh: |-
        同一个人换到 Cursor(不用 Claude Code),希望方法论也跟着过去
    you_say:
      en: |-
        Install superpowers in this Cursor workspace, then start a new feature for me
      zh: |-
        在这个 Cursor 工作区装上 superpowers,然后给我开个新功能
    what_happens:
      en: |-
        The .cursor-plugin folder configures Cursor to load the same 14 skills. The agent recognises the new feature request and brainstorms with you the same way it would in Claude Code — but plugin depth on Cursor is 1 file vs Claude Code's 2, so agent-side prompt prep is slightly thinner. You see the same flow, with a less polished trigger story.
      zh: |-
        .cursor-plugin 目录配置 Cursor 加载相同的 14 个 skill。agent 识别到新功能请求,跟你 brainstorm 的方式跟在 Claude Code 上一样 —— 但 Cursor 的 plugin 配置只有 1 个文件,Claude Code 有 2 个,所以触发提示稍薄。流程一致,触发故事略糙。
