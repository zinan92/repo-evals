workflow_diagram:
  layout: tree
  why_layer:
    en: |
      Compound (not molecule) — at two diamond-shaped nodes the agent decides at runtime which methodology skill fires next, based on the LLM's read of your request. A molecule would be a fixed pipeline (every run takes the same path); a compound is a tree with branches the LLM picks live. Specifically: (1) "Is the spec clear?" decides whether brainstorming fires; (2) "Is this work big enough to split?" decides whether subagent-driven-development fires.
    zh: |
      复合物(不是分子) —— 在两个菱形节点上,agent 运行时根据 LLM 对你需求的判断决定下一步触发哪个方法论 skill。分子是固定流水线(每次都走同一条路);复合物是 LLM 现场选支路的树。具体两个决策点: (1)"需求是否清晰?"决定是否触发 brainstorming;(2)"工作量是否需要拆分?"决定是否触发 subagent-driven-development。
  nodes:
  - id: request
    type: start
    rank: 0
    lane: 1
    label:
      en: |-
        User feature request
      zh: |-
        用户提需求
  - id: dec_brainstorm
    type: decision
    rank: 1
    lane: 1
    label:
      en: |-
        Spec clear enough?
        (LLM decides)
      zh: |-
        需求是否清晰?
        (LLM 决定)
  - id: brainstorming
    type: atom
    rank: 2
    lane: 0
    label:
      en: |-
        brainstorming
      zh: |-
        brainstorming
  - id: plans
    type: atom
    rank: 3
    lane: 1
    label:
      en: |-
        writing-plans
      zh: |-
        writing-plans
  - id: tdd
    type: atom
    rank: 4
    lane: 1
    label:
      en: |-
        test-driven-development
      zh: |-
        test-driven-development
  - id: dec_subagent
    type: decision
    rank: 5
    lane: 1
    label:
      en: |-
        Big enough to split?
        (LLM decides)
      zh: |-
        工作量需要拆分?
        (LLM 决定)
  - id: subagent
    type: atom
    rank: 6
    lane: 0
    label:
      en: |-
        subagent-driven-development
      zh: |-
        subagent-driven-development
  - id: verify
    type: atom
    rank: 7
    lane: 1
    label:
      en: |-
        verification-before-completion
      zh: |-
        verification-before-completion
