run_id: run-static-checks
date: 2026-05-04
operator: repo-evals (claim-first, static-only)
repo:
  owner: remotion-dev
  repo: skills
  branch: main
  package_name: "@remotion/skills"
  package_version: "4.0.456"
  npm_published: false  # private:true, registry 404

scope: |
  Static-checkable claims for SKILL.md shape, rules depth, distribution
  status, and the in-repo studio harness. Live agent execution
  (claim-005) deferred to atom-level scenario run.

claims_evaluated:
  - id: claim-001
    status: passed
    note: "SKILL.md has standard frontmatter (name, description, metadata.tags) + 'When to use' section"
  - id: claim-002
    status: passed
    note: "35 .md files in rules/, 30 of them >1KB; covers audio/captions/ffmpeg/lottie/mapbox/etc"
  - id: claim-003
    status: passed
    note: "package.json private:true; npm registry @remotion/skills/latest returns 404 — consistent with 'internal package'"
  - id: claim-004
    status: passed
    note: "src/index.ts calls registerRoot; Root.tsx declares 3 Compositions; all 3 imports point to existing rules/assets/*.tsx files"

claims_deferred:
  - claim-005  # live agent session reading SKILL.md and generating Remotion code

artifacts:
  - artifacts/package.json
  - artifacts/skill.md
  - artifacts/index.ts
  - artifacts/Root.tsx

logs:
  - logs/skills-dir.txt
  - logs/src-dir.txt
  - logs/remotion-skills-dir.txt
  - logs/sample-skill-name.txt
  - logs/rules-dir.txt
  - logs/static-evidence.txt

provenance:
  data_sources:
    - "raw.githubusercontent.com/remotion-dev/skills/main/{package.json,src/{index.ts,Root.tsx},skills/remotion/SKILL.md}"
    - "registry.npmjs.org/@remotion/skills/latest"
    - "gh api repos/remotion-dev/skills/contents/skills/remotion/rules"
  network_dependent: true
  reproducible: yes
