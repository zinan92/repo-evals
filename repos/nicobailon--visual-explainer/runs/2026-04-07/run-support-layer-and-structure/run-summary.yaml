  ❌ install-pi.sh has a real bug (claim-004 = fail):
    Reproduction:
      $ rm -rf /tmp/ve-install-test
      $ HOME=/tmp/ve-install-test bash install-pi.sh
      → Cloning visual-explainer...
      → Installing skill to /tmp/ve-install-test/.pi/agent/skills/visual-explainer...
      → cp: /tmp/ve-install-test/.pi/agent/skills/visual-explainer: No such file or directory
      → exit 1 (because of `set -e`)
    Root cause: install-pi.sh:23 does `cp -r plugins/visual-explainer "$SKILL_DIR"` without first
    `mkdir -p "$(dirname "$SKILL_DIR")"`. If ~/.pi/agent/skills/ doesn't exist, cp fails.
    The script DOES `mkdir -p "$PROMPTS_DIR"` later (line 35), but that's after the cp.
    Fix: 1 line: `mkdir -p "$(dirname "$SKILL_DIR")"` before line 22's `rm -rf "$SKILL_DIR"`.
    Once parent dir exists, install works correctly:
      - all SKILL files copied to ~/.pi/agent/skills/visual-explainer/
      - {{skill_dir}} placeholder substituted to real path (verified: 0 remaining; share.sh
        invocation lines now use absolute path)
      - prompts copied to ~/.pi/agent/prompts/

  ❌ share.sh has undocumented external dependency (claim-005 = fail-partial):
    - README says: "/share | Deploy an HTML page to Vercel and get a live URL"
    - Reality: share.sh does NOT call vercel CLI directly. It searches for an external
      `vercel-deploy` skill at:
        ~/.pi/agent/skills/vercel-deploy/scripts/deploy.sh
        /mnt/skills/user/vercel-deploy/scripts/deploy.sh
    - Without that skill installed, share.sh exits 1 with "vercel-deploy skill not found.
      Install it with: pi install npm:vercel-deploy"
    - This dependency is NOT mentioned in README's Install section, Commands table, or
      How It Works section. New users running /share will hit this error and have to
      go find the dependency themselves.
    - The error message itself is good (tells you the install command), but the
      undocumented requirement is a UX trap.

  ✅ Failure modes (claim-006):
    - bash share.sh                          → "Error: Please provide an HTML file" + exit 1
    - bash share.sh /tmp/nonexistent.html    → "Error: File not found" + exit 1
    - bash share.sh /tmp/ve-real.html        → "Error: vercel-deploy skill not found.
                                                Install it with: pi install npm:vercel-deploy"
                                              + exit 1
    - All three return exit 1 with actionable errors.

