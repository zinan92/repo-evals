notes: 'Local-only Python 3.12 CLI/TUI for browsing public market-data + event-stream

  snapshots fetched from Google Sheets workbooks (4 datasets via dataset_registry.json:

  market_snapshot / anomaly_panel / market_stats / event_stream). Self-installs via

  curl|sh, auto-updates, ships with TUI fallback for browser/SSH terminals. No LLM,

  no server credentials, no SQLite — just JSON snapshot cache.


  README is unusually candid about what it does NOT do (no PostgreSQL writeback,

  no SQLite, no cloud accounts) — this clarity is itself a quality signal.


  Static layer: install script, dataset registry, package layout, command entry

  points are all auditable from this machine.


  Live layer: actual Google Sheets fetch + cache write + TUI render need a real

  install. Crypto/market workbook owners can revoke or change tab GIDs at any

  time — those are runtime risks no static eval covers.

  '
product_view:
  one_liner:
    en: A local-only Python CLI/TUI that pulls 4 public market-data snapshots from
      Google Sheets, caches them as JSON, and lets you browse them in a terminal panel
      — no API key, no server, no database, just a single command.
    zh: 一个完全本地的 Python CLI/TUI 工具：从 Google Sheets 拉 4 个公开行情和事件流快照，存为本地 JSON 缓存，在终端面板里浏览。不要
      API key，不要服务端，不要数据库，一条命令装完。
  best_for:
    en: Crypto/market traders who want a no-config terminal dashboard for shared public
      data, comfortable installing via curl|sh, comfortable with Google Sheets as
      a data backbone.
    zh: 想要一个零配置终端看板、信得过 Google Sheets 作为公开数据载体的加密/行情交易者。前提：能接受 curl|sh 一键安装。
  watch_out:
    en: 'The "public data" lives in Google Sheets workbooks owned by the project —
      if those workbooks are renamed, deleted, or have their tab GIDs changed, every
      dataset breaks until dataset_registry.json is updated. Auto-update is on by
      default and can pull breaking changes silently; set TRADECAT_NO_AUTO_UPDATE=1
      if you need stability. The disclaimer is explicit that this is "for technical
      research only" — do not feed its data straight into trading decisions.

      '
    zh: '所谓「公开数据」其实存在项目方维护的 Google Sheets 里 —— 表被改名、删了或者 tab GID 变了，所有 dataset 都会跟着坏，直到
      dataset_registry.json 被更新。默认开启自动更新，可能悄悄拉到 breaking change；要稳定的话设 TRADECAT_NO_AUTO_UPDATE=1。免责声明很明确写了「仅供技术研究」——
      别把它的数据直接拿去交易决策。

      '
  use_for:
  - en: Crypto / market traders who want a no-config terminal dashboard for shared
      public data.
    zh: 想要零配置终端看板、信得过共享公开数据的加密 / 行情交易者。
  - en: Comfortable with Google Sheets as a data backbone and curl|sh install.
    zh: 能接受 Google Sheets 作为数据底座和 curl|sh 一键安装。
  - en: Want to evaluate the data without installing first — use the zero-install
      request.py.
    zh: 想先评估数据再决定是否安装 —— 用零安装的 request.py。
  dont_use_for:
  - en: Do NOT feed its data straight into trading decisions — README itself says
      'research only'.
    zh: 不要把它的数据直接喂给真实交易决策 —— README 自己写明仅供研究。
  - en: Do NOT depend on it in environments where Google Sheets reachability matters
      — set TRADECAT_NO_AUTO_UPDATE=1 if you need stability.
    zh: Google Sheets 不可达的环境下别依赖它；要稳定的话设 TRADECAT_NO_AUTO_UPDATE=1。
