      Ready-to-use methodology bundle (10 skills covering contradiction analysis, investigation-first, mass-line, etc.). Different audience: when you need a methodology not when you need to author one.
    zh: |-
      可以直接用的方法论合集(10 个 skill 覆盖矛盾分析 / 调研优先 / 群众路线 等)。不同受众: 你需要"用"方法论,而不是"写"方法论。
workflow_diagram:
  layout: linear
  why_layer: |
    Molecule — fixed pipeline of skill-authoring atoms (analyze →
    generate draft → run evals → compare versions → iterate). The
    user picks the entry mode (new skill / improve / benchmark) but
    inside the chosen mode, the pipeline is deterministic. Sub-agents
    (analyzer / comparator / grader) are atoms wired by the harness;
    the LLM doesn't decide which sub-agent fires — the script does.
  nodes:
  - id: input
    type: start
    rank: 0
    lane: 0
    label:
      en: |-
        Skill brief
        (or existing skill to improve)
      zh: |-
        skill 简介
        (或要优化的现成 skill)
  - id: draft
    type: atom
    rank: 1
    lane: 0
    label:
      en: |-
        SKILL.md draft
        (auto + human review)
      zh: |-
        SKILL.md 草稿
        (自动 + 人工 review)
  - id: analyzer
    type: atom
    rank: 2
    lane: 0
    label:
      en: |-
        Analyzer agent
        (frontmatter / trigger fit)
      zh: |-
        Analyzer agent
        (frontmatter / trigger 拟合度)
  - id: grader
    type: atom
    rank: 3
    lane: 0
    label:
      en: |-
        Grader + comparator
        (blind A/B on benchmark)
      zh: |-
        Grader + comparator
        (benchmark 盲 A/B)
  - id: viewer
    type: atom
    rank: 4
    lane: 0
    label:
      en: |-
        eval-viewer
        (1325-line HTML report)
      zh: |-
        eval-viewer
        (1325 行 HTML 报告)
  - id: out
    type: end
    rank: 5
    lane: 0
    label:
      en: |-
        Published skill
        + auditable benchmarks
      zh: |-
        正式发布的 skill
        + 可审计的 benchmark
  edges:
  - from: input
    to: draft
  - from: draft
    to: analyzer
  - from: analyzer
    to: grader
  - from: grader
    to: viewer
  - from: viewer
    to: out

deployment:
  installable: true
  install_methods:
    - method: "git clone anthropics/skills + cp -r skills/skill-creator ~/.claude/skills/"
      platform: any
      complexity: moderate
    - method: "Git sparse-checkout for just this one skill"
      platform: any
      complexity: moderate
  requires_compile: false
  works_offline_after_install: false  # Calls Anthropic API
  notes: "Sub-directory of a catalog repo — no `npm install` or single-line clone for just this skill."

third_party_services:
  - name: "Anthropic Claude API"
    purpose: "LLM that runs the skill itself + powers all 3 sub-agents (analyzer/comparator/grader)"
    required: true
    api_key_needed: true
    signup_needed: true
    free_tier: false
    cost_note: "Iterative improvement loop multiplies token cost per round (grader + comparator + analyzer all consume tokens). Budget accordingly."
  - name: "Python 3 runtime"
    purpose: "Runs the 9 scripts (eval / package / validate / report)"
    required: true
    api_key_needed: false
    signup_needed: false
    free_tier: true
    cost_note: "Standard local Python — no extra cost"
