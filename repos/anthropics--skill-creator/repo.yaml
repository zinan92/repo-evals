    zh: |-
      都是让 AI agent 工作得更好 —— 但层级不同。skill-creator 是元工具(教你正确地写 skill);superpowers 是具体方法论(14 个现成的)。经常一起用: 日常方法论用 superpowers,需要给某领域写新 skill 时用 skill-creator。
  this_better_at:
