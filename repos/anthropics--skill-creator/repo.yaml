owner: anthropics
repo: skill-creator
display_name: skill-creator
# Note: this is a *sub-directory* of github.com/anthropics/skills, not a
# standalone repo. Eval slug deliberately uses `anthropics/skill-creator`
# to make the dossier easy to find. repo_url points to the actual tree.
repo_url: https://github.com/anthropics/skills/tree/main/skills/skill-creator
repo_type: skill
archetype: hybrid-skill
# Layer: atom | molecule | compound. See docs/LAYERS.md.
# Multiple distinct user-invocable capabilities (create / validate /
# improve-description / package / run-eval / iterative-improve-loop /
# aggregate-benchmark / generate-report) wired by predefined commands.
# 3 sub-agents (analyzer/comparator/grader) for QA. Predefined
# orchestration → molecule, not compound.
layer: molecule
complexity: complex
uses_areas: false
status: evaluated
last_evaluated: "2026-05-05"
version_tested: "main@HEAD (in anthropics/skills monorepo, pushed 2026-05-03)"
# Stars are the parent repo's (anthropics/skills, 128k) — this skill is one
# entry in Anthropic's official skill catalog. The catalog stars are a fair
# ecosystem signal because the catalog IS what people install.
stars: 128303
archived: false
has_license: true   # Apache 2.0 in skills/skill-creator/LICENSE.txt
multilingual_readme: false
release_pipeline_score: 1
# eval-discipline = 3: this skill ships a full eval harness (run_eval.py,
# run_loop.py, 3 LLM grader/comparator/analyzer agents, eval-viewer/
# with 1325-line HTML reviewer + Python report generator). Of all 19
# repos evaluated, this is the only one that earns a 3 honestly.
eval_discipline_score: 3
recently_active: true
notes: |
  Anthropic's official skill for creating, evaluating, and improving
  skills. Lives at github.com/anthropics/skills/tree/main/skills/
  skill-creator. 485-line SKILL.md + 9 Python scripts (47-471 lines
  each) + 3 sub-agent prompts (analyzer / blind-comparator / grader)
  + 1,325-line eval-viewer HTML + 430-line schemas reference doc.
  Apache 2.0.

  This is the most evidence-rich skill in the entire eval batch:
  the only one with a real LLM-output eval harness (eval_discipline=3).
  Anthropic team eats their own dog food — they use it to build their
  other official skills.

  Workflow: user describes a skill they want → SKILL.md routes through
  draft → quantitative + qualitative evals → iterate. The 3 sub-agents
  do blind comparison of skill versions and grade transcripts against
  expectations. eval-viewer generates HTML reports.

product_view:
  one_liner:
    en: "Anthropic's official Claude Code skill for creating, evaluating, and iteratively improving skills — ships a full LLM-output eval harness (3 grader agents, blind-comparison, benchmark aggregation, HTML eval-viewer) so quality measurement is built into the workflow, not an afterthought."
    zh: "Anthropic 官方的「写 skill 的 skill」：创建 / 评测 / 迭代改进 skill 一站式。自带完整的 LLM 输出评测工具链（3 个评测 agent、盲对比、benchmark 聚合、HTML 评测看板），把质量测量做成工作流的一部分，不是事后补的。"
  persona:
    en: |-
      A skill author who has built a few Claude Code skills the seat-of-the-pants way and now realises "is my skill actually good?" can only be answered by something that grades the LLM output, not by reading the SKILL.md. Typical: developer building internal-team skills, indie author shipping a public skill bundle, methodology consultant systematising their playbook.
    zh: |-
      已经凭直觉写过几个 Claude Code skill 的作者,意识到"我这 skill 到底好不好"必须靠评测 LLM 输出才答得上,光看 SKILL.md 没用。典型: 给内部团队写 skill 的开发者、发公开 skill 合集的独立作者、系统化自己 playbook 的方法论顾问。
  scenario:
    en: |-
      You're about to ship a new skill (or a v2 of an old one). You don't want to find out it's worse than v1 from user complaints — you want to A/B test now, with quantitative evidence, against the old version on a benchmark of real prompts.
    zh: |-
      你准备发一个新 skill(或者老 skill 的 v2)。你不想等用户抱怨才发现 v2 比 v1 还差 —— 你想现在就 A/B 测,用量化证据,在一组真实 prompt 上跟老版本对比。
  without_this:
    en: |-
      Two options. (1) Ship and pray — discover the regression after deployment when users complain. (2) Hand-author your own eval harness: write 3 grader prompts, build a blind-comparison script, run it against your benchmark, aggregate variance — that's an afternoon to a week of plumbing per skill, before any actual evaluation happens.
    zh: |-
      两条路。(1) 发了再说 —— 上线后用户抱怨才发现 v2 不如 v1。(2) 自己写一套评测: 3 个评分 prompt + 盲对比脚本 + 跑你的 benchmark + 聚合方差 —— 单 skill 下午到一周的接管道工时间,真正评测还没开始呢。
  with_this:
    en: |-
      You describe the skill, the harness handles draft → quantitative + qualitative evals → iterate. Three sub-agents (analyzer / blind-comparator / grader) run blind A/B between versions and grade transcripts against your expectations. eval-viewer renders 1325-line HTML report for human review. Anthropic eats their own dog food building official skills with this.
    zh: |-
      你描述要的 skill,流水线自动跑 草稿 → 量化 + 定性评测 → 迭代。3 个子 agent(analyzer / 盲对比 / grader) 在版本之间跑盲 A/B,按你的期望给 transcript 评分。eval-viewer 出 1325 行的 HTML 报告给人审。Anthropic 自己造官方 skill 都用这一套。
  cost_summary:
    en: |-
      Apache 2.0, free skill itself. Cost is on the API side — every eval round multiplies LLM calls across grader + comparator + analyzer sub-agents. Budget: a 20-prompt benchmark with 3 graders + 1 comparator over 5 iterations is ~300 LLM calls. Setup labour: clone anthropics/skills (a catalog repo) and copy skill-creator/ into your skills dir; not a one-line install.
    zh: |-
      Apache 2.0,skill 本身免费。成本在 API 侧 —— 每一轮评测会多发 LLM 调用(grader + comparator + analyzer 三个子 agent)。预算: 20 条 prompt 的 benchmark × 3 grader + 1 comparator × 5 轮 ≈ 300 次 LLM 调用。安装手工成本: clone 整个 anthropics/skills(catalog 仓库)再把 skill-creator/ 拷到你的 skills 目录;不是一行命令。
  watch_out:
    en: |-
      Sub-directory of anthropics/skills (catalog repo) — `npm install` doesn't work. Heavyweight: 485-line SKILL.md and 9 Python scripts to learn. Don't run iterative loops without a token budget — costs multiply per round. Not worth it for trivial 50-line skills; just hand-write those.
    zh: |-
      anthropics/skills(catalog 仓库)的子目录 —— `npm install` 装不了。比较重: 485 行 SKILL.md + 9 个 Python 脚本要学。不设 token 预算别跑迭代 loop —— 每轮成本翻倍。50 行的小 skill 别动这个,直接手写更快。
  examples:
  - context:
      en: |-
        A skill author shipping v2 of a domain-specific skill (say, an SQL-writing skill) and worried v2's broader description hurt auto-trigger precision
      zh: |-
        准备发某领域 skill v2(比如 SQL 写作 skill)的作者,担心 v2 更宽的 description 反而让 auto-trigger 精度下降
    you_say:
      en: |-
        Run skill-creator's blind-compare on my SQL skill v1 vs v2 against a benchmark of 30 SQL-related prompts + 20 unrelated prompts; tell me which version has better trigger precision
      zh: |-
        用 skill-creator 的盲对比跑我 SQL skill v1 vs v2,benchmark 30 个 SQL 相关 prompt + 20 个不相关 prompt;告诉我哪个版本 trigger 精度更高
    what_happens:
      en: |-
        Comparator agent runs each prompt blind through both versions, grader scores each transcript on did-it-trigger + answer-quality, analyzer aggregates 50 prompts × 2 versions × 3 trial runs into a variance-aware HTML report. You see "v2 lost 12% on unrelated prompts due to broader description; v1 wins on trigger precision."
      zh: |-
        comparator agent 把每条 prompt 盲跑两个版本,grader 给每个 transcript 按"是否触发 + 回答质量"打分,analyzer 把 50 prompt × 2 版本 × 3 重复 聚合成带方差的 HTML 报告。你看到"v2 因为 description 更宽,在不相关 prompt 上多触发 12%;v1 trigger 精度更高"。
  - context:
      en: |-
        A team lead reviewing a junior's first skill submission to the company skill registry
      zh: |-
        团队 lead 审核新人提交到公司 skill 注册表的第一个 skill
    you_say:
      en: |-
        Use skill-creator to grade this submitted skill on draft-quality, trigger-fitness, and output-faithfulness; flag concrete improvements
      zh: |-
        用 skill-creator 给这个提交的 skill 打分(草稿质量 / trigger 合理度 / 输出忠实度),列出具体改进项
    what_happens:
      en: |-
        Analyzer dissects SKILL.md (frontmatter checks, description-vs-trigger-pattern alignment), grader runs 10 sample prompts and scores transcript faithfulness, eval-viewer renders the result. You hand back the report with concrete "fix L42, your description triggers on Q3 but not Q9" feedback instead of "looks fine."
      zh: |-
        analyzer 拆解 SKILL.md(frontmatter 检查 / description 与 trigger 是否对齐),grader 跑 10 条样本 prompt 给 transcript 忠实度打分,eval-viewer 出报告。你给新人的反馈是具体的"修第 42 行,你的 description 在 Q3 触发但 Q9 不触发",不是"看起来还行"。
  - context:
      en: |-
        An indie skill author preparing the first public release of a skill bundle on GitHub
      zh: |-
        独立作者准备在 GitHub 第一次公开发布一个 skill 合集
    you_say:
      en: |-
        Run a 50-prompt eval on each of my 5 skills + dump a benchmark report I can include in the README so users see why this is calibrated
      zh: |-
        给我 5 个 skill 各跑一次 50 条 prompt 的 evaluation,出一份 benchmark 报告我能贴进 README,让用户看到这套是经过校准的
    what_happens:
      en: |-
        Harness runs all 5 skills × 50 prompts, generates per-skill HTML eval-viewer reports + a markdown summary table. You drop the table in README's "evidence" section. Public users now have a real reason to trust your bundle vs the random 100-skill catalogs out there.
      zh: |-
        流水线跑完 5 个 skill × 50 条 prompt,出每个 skill 的 HTML eval-viewer 报告 + 一份 markdown 汇总表。你贴到 README 的 evidence 段。读者从此有真凭实据信你这个合集,而不是跟那些随便 100 个 skill 的 catalog 一样。
