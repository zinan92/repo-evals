  this_better_at:
    en: |-
      Tooling for measurement. Anthropic's own production-grade pipeline; lets you prove your skill works, not just claim it.
    zh: |-
      测量工具链。Anthropic 自家生产级流水线;能让你证明 skill 真有效,不是光说。
