notes: |
  This run was executed against local target repo commit e86ed97 on branch main.
  The local checkout is one commit ahead of origin/main, but the extra commit is
  documentation-only (`feat: add capability contract (SKILL.md + capability.json)`),
  so runtime behavior should still represent the public repo.

  Douyin still works well in real conditions: the signed API path fails three times,
  then Playwright fallback takes over and downloads a 178 MB video plus cover and
  populated metadata. The rerun still wastes the three API retries before printing
  "Skipped (already downloaded)", so dedup remains correct but late.

  WeChat OA still silently fails on two different article URLs. The CLI prints
  "Downloaded", but article.html is 0 bytes and content_item.json / metadata.json
  have empty title, author, and publish_time fields.

  X still fails the repo's user-facing claim. The CLI prints "Downloaded" and writes
  a text-shaped placeholder, but there is no text.txt, no media, and all substantive
  metadata fields remain empty. The output structure is also inconsistent: the CLI
  reports one content directory while metadata is written under an additional
  `x/unknown/<tweet_id>/` path.

  The repo's own test suite is not green on this machine: `python3 -m pytest -q`
  produced 294 passed / 9 failed, with failures concentrated in the Douyin adapter
  tests. Coverage reported by pytest was 75%, which does not match the README badge.
