archetype: hybrid-skill
# Layer: atom | molecule | compound. See docs/LAYERS.md.
# 10 distinct user-invocable methodology skills (矛盾分析法 / 实践认识论 /
# 调查研究 / 群众路线 / 批评与自我批评 / 持久战略 / 集中兵力 / 星火燎原 /
# 统筹兼顾 + 实事求是总原则). User invokes any one separately. → molecule.
layer: molecule
complexity: medium
uses_areas: false
status: evaluated
