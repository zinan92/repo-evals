workflow_diagram:
  layout: linear
  why_layer: |
    Molecule — the user picks which methodology skill(s) to invoke at
    a given moment, but inside each invocation the skill follows a
    fixed structure (define question → investigate → analyse →
    conclude). The methodology itself is determined by which skill
    fired, not by LLM at runtime. Multiple user-invocable atoms,
    no compound decisions.
  nodes:
  - id: ask
    type: start
    rank: 0
    lane: 0
    label:
      en: |-
        Hard question
        (analysis / strategy / debug)
      zh: |-
        难题
        (分析 / 战略 / 调试)
  - id: pick
    type: atom
    rank: 1
    lane: 0
    label:
      en: |-
        User picks methodology
        (investigation / contradiction / ...)
      zh: |-
        用户选方法论
        (调查 / 矛盾 / ...)
  - id: invoke
    type: atom
    rank: 2
    lane: 0
    label:
      en: |-
        Skill fires
        (questions / framework)
      zh: |-
        skill 触发
        (反问 / 框架)
  - id: cite
    type: atom
    rank: 3
    lane: 0
    label:
      en: |-
        Original-text citations
        (per skill)
      zh: |-
        原文引用
        (每个 skill 自带)
  - id: out
    type: end
    rank: 4
    lane: 0
    label:
      en: |-
        Structured analysis
        (not flat answer)
      zh: |-
        结构化分析
        (不是平铺答案)
  edges:
  - from: ask
    to: pick
  - from: pick
    to: invoke
  - from: invoke
    to: cite
  - from: cite
    to: out

deployment:
  installable: true
  install_methods:
    - method: "npx qiushi-skill install <platform>"
      platform: "Claude Code / Codex / Cursor / Hermes / NanoBot / OpenClaw / OpenCode"
      complexity: easy
    - method: "git clone + cp skills/ to platform skills dir"
      platform: any
      complexity: moderate
  requires_compile: false
  works_offline_after_install: true

third_party_services:
  - name: "AI agent runtime (Claude Code / Codex / Cursor / Hermes / NanoBot / OpenClaw / OpenCode)"
    purpose: "Host that loads the skills"
    required: true
    api_key_needed: true
    signup_needed: true
    free_tier: false
    cost_note: "Standard agent-side cost; the skill itself is pure markdown (no extra API calls)"
