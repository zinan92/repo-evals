notes: |
  A 层全部通过：
    - .claude-plugin/marketplace.json + plugins/frontend-slides/.claude-plugin/plugin.json
      结构合法；plugins/ 下镜像了所有 SKILL 文件（diff -q SKILL.md 完全一致）
