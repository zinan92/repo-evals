      全部带 colors + typography + signature elements 块
    - viewport-base.css 包含 .slide overflow:hidden + height: 100dvh + clamp() 字号

  小问题（pass-with-concerns）：
    - extract-pptx.py 的 title 检测在两个测试 PPT 上都返回空字符串（"(no title)"）。
      原因是 `if shape == slide.shapes.title:` 在 title placeholder 为 None 时
      永远 False。文本仍然进入 content 数组，所以信息没丢，但下游会拿不到 title 字段。
    - extract-pptx.py 不过滤空 text frame，content 数组里有大量 {"type":"text","content":""}
      占位项，会让 LLM 在 Phase 4 confirm 时看一堆噪音。

  设计层验证（passed_design_only）：
    - viewport-fitting 规则在 SKILL.md / viewport-base.css 里写得很死；clamp()、
      height:100dvh、overflow:hidden 都齐了。但"LLM 是否真的会遵守"只能在端到端
      会话里验证，本次未做。

