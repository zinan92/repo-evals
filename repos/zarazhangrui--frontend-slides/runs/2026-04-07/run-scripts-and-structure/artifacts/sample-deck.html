<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sample</title>
<style>
html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
.slide { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
.slide:nth-child(1) { background: #1a1a1a; color: #fff; }
.slide:nth-child(2) { background: #FF5722; color: #fff; }
.slide:nth-child(3) { background: #4361ee; color: #fff; }
h1 { font-size: 4rem; }
</style>
</head>
<body>
<div class="slide"><h1>Slide One</h1><p>Hello from frontend-slides eval</p></div>
<div class="slide"><h1>Slide Two</h1><p>Testing the export-pdf script</p></div>
<div class="slide"><h1>Slide Three</h1><p>End of deck</p></div>
</body>
</html>
