workflow_diagram:
  layout: io
  why_layer: |
    Atom — one user-invocable capability (markdown → WeChat HTML).
    Internal phases (parse → inspect → convert → optional image
    upload → optional draft creation) aren't user-orchestrated; you
    say "convert this", the tool runs the pipeline, you get HTML.
    The optional LLM modes (humanize / write-from-idea) are still
    atom-shaped — one input, one polished output.
  nodes:
  - id: input
    type: start
    rank: 0
    lane: 0
    label:
      en: |-
        Markdown article
        (.md file)
      zh: |-
        Markdown 文章
        (.md 文件)
  - id: skill
    type: atom
    rank: 1
    lane: 0
    label:
      en: |-
        md2wechat skill
        (inspect → convert → optional upload)
      zh: |-
        md2wechat skill
        (inspect → 转换 → 可选上传)
  - id: output
    type: end
    rank: 2
    lane: 0
    label:
      en: |-
        WeChat editor-ready HTML
        (or direct draft)
      zh: |-
        公众号可贴 HTML
        (或直接草稿)
  edges:
  - from: input
    to: skill
  - from: skill
    to: output
deployment:
  installable: true
  install_methods:
  - method: brew install md2wechat
    platform: macOS
    complexity: easy
  - method: npm install -g @md2wechat/cli
    platform: any (Node.js)
    complexity: easy
  - method: install script (curl ... | bash)
    platform: any
    complexity: easy
  - method: go build ./cmd/md2wechat (from source)
    platform: any (Go 1.26.1+)
    complexity: moderate
  requires_compile: false
  works_offline_after_install: false
third_party_services:
- name: md2wechat.cn (core conversion)
  purpose: Server-side Markdown → WeChat HTML conversion
  required: true
  api_key_needed: false
  signup_needed: false
  free_tier: true
  cost_note: Free tier sufficient for normal blogger volumes; service availability dependency
- name: WeChat Material Library API
  purpose: Optional image upload + draft creation
  required: false
  api_key_needed: true
  signup_needed: true
  free_tier: true
  cost_note: Need WeChat official-account credentials for upload-images / create-draft modes
- name: LLM provider (gemini / modelscope / openai / openrouter / tuzi / volcengine)
  purpose: Optional "humanize" + "write from idea" modes
  required: false
  api_key_needed: true
  signup_needed: true
  free_tier: false
  cost_note: BYOK for whichever provider you pick; per-request pricing
