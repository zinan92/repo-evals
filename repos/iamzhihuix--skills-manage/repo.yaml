last_evaluated: "2026-04-24"
notes: |
  Tauri desktop app managing AI coding agent skills across 28 platforms via
  ~/.agents/skills/ central dir + symlinks. v0.9.1, 11 days old, 910 stars.
  Eval was source-inspection + DMG integrity only; runtime GUI skipped
  because tester's live ~/.agents/skills/ and ~/.claude/skills/ are in use.
  Adapter archetype hybrid-cap applied: core user-facing layer untested → capped at 'usable'.

# Product view — user-facing descriptions in both languages.
# The renderer picks whichever matches the user's active UI language.
# If a field is missing for one language the renderer falls back to
# the other language. These fields are what non-technical readers see.
product_view:
  one_liner:
    en: "Manage skills across 28 AI coding tools (Claude Code, Cursor, Codex, Gemini CLI, Trae, etc.) from one desktop app. Edit a skill once, sync to every tool."
    zh: "一个桌面应用，帮你管理 Claude Code、Cursor、Codex、Gemini CLI、Trae 等 28 个 AI 编程工具的技能库。技能改一处，所有工具同步更新。"
  best_for:
    en: "Users who juggle multiple AI coding tools and haven't already adopted another skill manager."
    zh: "同时在用多个 AI 编程工具，且还没有另一套技能管理方案的用户。"
  watch_out:
    en: "Pre-1.0 (v0.9.1). macOS build is unsigned (one-time xattr workaround needed). API keys stored in cleartext in ~/.skillsmanage/db.sqlite. Runtime workflow never observed end-to-end in this eval."
    zh: "还不到 1.0（v0.9.1）。macOS 版本未签名（首次启动需要手动运行 xattr 命令一次）。API key 在 ~/.skillsmanage/db.sqlite 里明文存储。本次评测没有真的打开 app 跑完整流程。"
