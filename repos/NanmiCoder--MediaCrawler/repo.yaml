  shared_purpose:
    en: |-
      Both are crawler/downloader pipelines for Chinese content platforms. Both have to handle login state + anti-bot signing per platform. Both store harvested content to local files for downstream analysis.
    zh: |-
      都是中国内容平台的爬虫/下载流水线。都要处理每个平台的登录态 + 反爬签名。都把抓到的内容存到本地文件给下游分析用。
  this_better_at:
    en: |-
      Working today (48K stars, recently active) + 7 platforms in one tool + 8 storage backends. Battle-tested signing helpers (libs/*.js + xhshow) that are kept up to date when platforms change.
    zh: |-
      现在能用(48K stars,持续维护) + 一个工具覆盖 7 个平台 + 8 种存储后端。久经考验的签名辅助(libs/*.js + xhshow),平台改版时会同步更新。
  other_better_at:
    en: |-
      Built specifically as a thin downloader (single-purpose, simpler API) — but currently broken on Douyin (signing failure → 0-byte output). When it works, simpler than MediaCrawler. When it doesn't, MediaCrawler is your only option.
    zh: |-
      专门做一个轻量下载器(单一目的,API 更简单) —— 但抖音目前签名失败导致 0 字节输出。能跑的时候比 MediaCrawler 简单;跑不通的时候 MediaCrawler 是你唯一的选择。
- slug: Usagi-org--ai-goofish-monitor
  shared_purpose:
    en: |-
      Both are Python crawlers for a Chinese platform with a "watch this thing for me" use case. Both handle login + scraping + storing under one CLI. Both ask you to maintain login state by hand.
    zh: |-
      都是中国平台的 Python 爬虫,做"帮我盯着这件事"的 use case。都把登录 + 抓取 + 存储放在一个 CLI 里。都要你自己维护登录态。
  this_better_at:
    en: |-
      Breadth — 7 platforms × 4 crawl modes (search / detail / creator / comments) × 8 storage backends. When you need data from any of those 7 platforms, this is the reference implementation.
    zh: |-
      覆盖广 —— 7 个平台 × 4 种抓取模式(搜索 / 详情 / 创作者 / 评论) × 8 种存储后端。任何这 7 个平台想要数据,这是参考实现。
  other_better_at:
    en: |-
      Single-platform deep-watch (Goofish/闲鱼 product monitoring). Continuous notification + price-change alerts that MediaCrawler doesn't have — MediaCrawler is one-shot scraping, not monitoring.
    zh: |-
      单平台深度监控(闲鱼商品价格 / 状态)。持续通知 + 降价提醒,MediaCrawler 没这些 —— MediaCrawler 是一次性抓取,不是监控。
workflow_diagram:
  layout: linear
  why_layer:
    en: |
      Molecule — a fixed pipeline of atoms (CLI parse → login → per-platform crawler → signing helper → storage adapter → output file). The pipeline is the same on every run; no LLM decides at runtime which step to take or skip. You configure once via flags, then the pipeline executes deterministically.
    zh: |
      分子 —— 固定的原子流水线(CLI 解析 → 登录 → 各平台爬虫 → 签名辅助 → 存储适配器 → 输出文件)。每次跑都是同一条路;运行时没有 LLM 决定下一步走哪或跳哪一步。flag 配一次,流水线确定性地执行。
  nodes:
  - id: cli
    type: start
    rank: 0
    lane: 0
    label:
      en: |-
        CLI args
        (platform / type / login)
      zh: |-
        CLI 参数
        (平台 / 类型 / 登录)
  - id: login
    type: atom
    rank: 1
    lane: 0
    label:
      en: |-
        Login atom
        (QR / phone / cookie)
      zh: |-
        登录原子
        (扫码 / 手机 / cookie)
  - id: crawler
    type: atom
    rank: 2
    lane: 0
    label:
      en: |-
        Per-platform crawler
        (Playwright)
      zh: |-
        各平台爬虫
        (Playwright)
  - id: signing
    type: atom
    rank: 3
    lane: 0
    label:
      en: |-
        Signing helper
        (libs/*.js + xhshow)
      zh: |-
        签名辅助
        (libs/*.js + xhshow)
  - id: storage
    type: atom
    rank: 4
    lane: 0
    label:
      en: |-
        Storage adapter
        (1 of 8 backends)
      zh: |-
        存储适配器
        (8 选 1)
  - id: output
    type: end
    rank: 5
    lane: 0
    label:
      en: |-
        CSV / JSON / SQLite
        / Postgres / Mongo / ...
      zh: |-
        CSV / JSON / SQLite
        / Postgres / Mongo / ...
  edges:
  - from: cli
    to: login
  - from: login
    to: crawler
  - from: crawler
    to: signing
  - from: signing
    to: storage
  - from: storage
    to: output
