last_evaluated: '2026-05-04'
notes: 'Python tool that uses Playwright browser automation to crawl 7

  Chinese social platforms (xhs / douyin / kuaishou / bilibili / weibo /

  tieba / zhihu) for posts + comments + creator data. 48,800+ stars,

  custom non-commercial license. Python 3.11 (.python-version),

  CRAWLERS factory in main.py wires PlatformEnum → per-platform

  crawler class. CLI types: search / detail / creator. Login: qrcode /

  phone / cookie. Storage: csv / db / json / jsonl / sqlite / mongodb /

  excel / postgres.


  Static layer: source layout, declared platform list, declared storage

  backends, and CLI surface can all be checked from this machine.


  Molecule layer: end-to-end flows on each platform need a real run

  with platform credentials. Anti-bot is the dominant risk — these

  pipelines break weekly when platforms change DOM / signing.

  Per-platform reusable verdict cannot be claimed without a recent

  live run on that platform.

  '
product_view:
  one_liner:
    en: One Python CLI that crawls posts / comments / creators / search from 7 Chinese
      platforms (Xiaohongshu, Douyin, Kuaishou, Bilibili, Weibo, Tieba, Zhihu) into
      8 storage backends.
    zh: 一个 Python CLI,把 7 个中文平台(小红书 / 抖音 / 快手 / B 站 / 微博 / 贴吧 / 知乎)的帖子 / 评论 / 创作者
      / 搜索抓进 8 种存储后端。
  persona:
    en: A Python-comfortable researcher, content analyst, or trend tracker who needs
      raw post / comment / creator data from one or more Chinese platforms for non-commercial
      analysis. NOT for production scraping.
    zh: 懂 Python 的研究者 / 内容分析师 / 趋势追踪人 —— 需要从某个或多个中文平台拿到原始的帖子 / 评论 / 创作者数据,用于非商用分析。不是给生产抓取用。
  scenario:
    en: You want this week's top Xiaohongshu posts under a tag, or all comments
      on a Douyin video, or a creator's last 200 Weibo posts. You'll log in with
      your real account once (QR / phone / cookie), let it run on your laptop, and
      dump to CSV / SQLite for downstream analysis.
    zh: 你想要本周小红书某个 tag 下的爆款,或者某个抖音视频的全量评论,或者某创作者在微博的最近 200 条帖子。准备真实账号登一次(扫码 / 短信 / cookie),挂在自己电脑上跑,导出
      CSV / SQLite 给下游分析用。
  without_this:
    en: 'You write per-platform crawlers from scratch. Each platform''s anti-bot,
      signing, login flow, pagination, comment threading is its own can of worms
      — a serious solo build is weeks per platform. Or you pay a SaaS data vendor
      (¥¥¥), or you scrape the open web (lower-quality data, no comments).

      '
    zh: '一个个平台从头写爬虫。每个平台的反爬 / 签名 / 登录 / 翻页 / 评论嵌套都是一堆坑 —— 单人认真写一个平台要好几周。要么花钱买 SaaS
      数据(¥¥¥),要么爬公开 web(数据质量低 / 评论拿不到)。

      '
  with_this:
    en: 'One CLI for 7 platforms. Login type (QR/phone/cookie), crawl type (search/detail/creator),
      and storage backend (CSV/JSON/SQLite/Postgres/MongoDB) are all flags. Day-1
      you have a working baseline. You''ll patch when a platform updates DOM/signing
      — but you''re patching working code, not starting from a blank file.

      '
    zh: '一个 CLI 跑 7 个平台。登录方式(扫码 / 手机 / cookie)、抓取类型(搜索 / 详情 / 创作者)、存储后端(CSV / JSON
      / SQLite / Postgres / MongoDB) 都是参数。第一天就有可跑的版本。平台改版你要打补丁,但起点是能跑的代码,不是空文件。

      '
  cost_summary:
    en: OSS but custom non-commercial license — research / personal only. Need a
      real account on each platform you want to crawl. Will break when platforms
      update DOM / signing — budget ongoing maintenance time. Paid PRO version exists
      (removes Playwright, adds resume / multi-account); not the same product.
    zh: 开源但自定义非商用 license —— 只能用于研究 / 个人。每个想抓的平台需要真实账号。平台改版会导致代码失效,要预留持续维护时间。有付费 PRO
      版本(去掉 Playwright,加断点续传 / 多账号),不是同一个东西。
  watch_out:
    en: 'README promises "no need to reverse complex encryption algorithms" but the
      codebase ships its own JS hooks (libs/) and signing helpers — encryption isn''t
      reversed by you, but it''s being handled internally, so platform signing updates
      still break runs. Login state caches are local plain-text files — don''t commit
      them. Use the built-in IP proxy pool config if you plan more than a handful
      of requests, and keep rates conservative — disclaimer is explicit about "no
      large-scale crawling".

      '
    zh: 'README 说"无需逆向复杂加密"但仓库里自己带了一套 JS hook(libs/)和签名辅助 —— 不是你来逆向,但加密一直在被处理,所以平台签名一升级仍然会让跑批失败。登录态缓存以明文存本地,别提交进
      git。请求量超过几个就用自带的 IP 代理池配置,频率保守一点 —— 免责声明很明确"不得用于大规模爬取"。

      '
  examples:
  - context:
      en: |-
        A content analyst researching trends before Double-11 — needs the top 100 posts under #双十一美妆 on Xiaohongshu for keyword + engagement analysis
      zh: |-
        内容分析师调研双十一前小红书 #双十一美妆 话题下 top 100 帖子,要做关键词 + 互动度分析
    you_say:
      en: |-
        python main.py --platform xhs --type search --keyword "双十一美妆" --start 0 --end 100 --save_data csv
      zh: |-
        python main.py --platform xhs --type search --keyword "双十一美妆" --start 0 --end 100 --save_data csv
    what_happens:
      en: |-
        First run pops a QR code in your terminal — scan with Xiaohongshu app to authorise. Playwright then opens a real browser, runs the search, paginates through 100 results, and writes data/xhs/search_results.csv with title / author / engagement / publish_time columns. Total: ~6 minutes for 100 posts.
      zh: |-
        第一次跑会在终端弹一个二维码 —— 用小红书 App 扫码授权。Playwright 然后开真实浏览器,跑搜索,翻页 100 条,把数据写到 data/xhs/search_results.csv(标题 / 作者 / 互动量 / 发布时间)。100 条大约 6 分钟。
  - context:
      en: |-
        A social-media researcher studying a Douyin influencer's content strategy — needs the last 200 videos from one creator with view counts
      zh: |-
        社交媒体研究者研究某抖音博主的内容策略 —— 需要某个创作者最近 200 条视频带播放量
    you_say:
      en: |-
        python main.py --platform douyin --type creator --creator_id 12345678 --max_count 200 --save_data sqlite
      zh: |-
        python main.py --platform douyin --type creator --creator_id 12345678 --max_count 200 --save_data sqlite
    what_happens:
      en: |-
        Login is cookie-based on first run (paste your douyin cookie into the config). Crawler iterates the creator's video list, hits the signing helper for each request, and writes 200 rows to data/douyin/creator_videos.sqlite. You query with SQL afterwards.
      zh: |-
        第一次跑用 cookie 登录(把你的抖音 cookie 贴到 config 里)。爬虫遍历创作者视频列表,每个请求都过签名辅助,写 200 行进 data/douyin/creator_videos.sqlite。之后用 SQL 查。
  - context:
      en: |-
        An indie dev building a local "Weibo trends" dashboard — needs all comments under one viral post for sentiment analysis
      zh: |-
        独立开发者做一个本地"微博热搜"dashboard —— 需要某条爆款博文下的全部评论做情绪分析
    you_say:
      en: |-
        python main.py --platform weibo --type detail --note_id 4901234567 --get_comment True --save_data jsonl
      zh: |-
        python main.py --platform weibo --type detail --note_id 4901234567 --get_comment True --save_data jsonl
    what_happens:
      en: |-
        Crawler hits the post detail endpoint, then walks the comment tree (top-level comments → replies → replies-to-replies) until exhausted. Output goes to data/weibo/comments.jsonl, one comment per line — easy to stream into a sentiment classifier.
      zh: |-
        爬虫先打详情端点,然后遍历评论树(一级评论 → 回复 → 回复的回复)直到取完。输出到 data/weibo/comments.jsonl,每行一条评论 —— 容易喂给情绪分类器。
similar_repos:
