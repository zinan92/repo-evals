version_tested: "main@HEAD (3.0.3)"
notes: |
  Self-hosted full-stack AI quant trading platform. 4-service Docker
  Compose stack: postgres + redis + Flask backend (Python 3.12) +
  prebuilt React frontend. Adds a separate MCP server (quantdinger-mcp
  v0.1.0, requires-python>=3.10) for Cursor / Claude Code / Codex /
  OpenClaw / NanoBot integration. Apache 2.0, version 3.0.3, also
  available as AWS Marketplace AMI.

  Multi-broker integration in backend requirements: ccxt (crypto),
  ib_insync (IBKR stocks), MetaTrader5 (forex, Windows-only). Multi-LLM
  via env: OpenAI, DeepSeek, Grok (with custom BASE_URL each).

  Compound layer: AI strategy generation, indicator generation,
  ensemble/calibration/reflection, multi-agent research are all
  LLM-driven at runtime. Per the framework's compound rule, eval is
  scenario-driven and capped at usable until ≥1 logged scenario.

product_view:
  one_liner:
    en: "A self-hosted Docker Compose stack for AI-assisted quantitative trading: charting, indicator and strategy generation, backtesting, and live execution across crypto / IBKR stocks / MT5 forex — talks to your AI agent through an MCP server, brings its own Postgres + Redis + Flask backend + React frontend."
    zh: "一个自托管的 AI 量化交易 Docker Compose 平台：行情图表、AI 辅助生成指标和策略、回测、加密货币 / IBKR 美股 / MT5 外汇实盘下单都在一套 stack 里。通过 MCP server 接你的 AI Agent，自带 Postgres + Redis + Flask 后端 + React 前端。"
  best_for:
    en: "Solo quants and small trading teams who want their own keys + their own server, willing to run Docker Compose, comfortable with multi-broker setup (IBKR / MT5 / crypto exchanges) and OK paying their own LLM bills."
    zh: "想要自己保管 key 和自己服务器的独立量化和小团队；能跑 Docker Compose，能接 IBKR / MT5 / 加密所，自己付 LLM 账单。"
  watch_out:
    en: |
      The README also points at SaaS (ai.quantdinger.com), AWS Marketplace AMI, and a paid-tier billing primitive — the open-source repo and the commercial product overlap, read which features are gated. Multi-broker support is heterogeneous: MetaTrader5 is Windows-only by design (the Python package only ships Windows wheels), so a Linux server cannot do forex without a separate Windows MT5 host. The default postgres password (quantdinger123) and bind port 127.0.0.1 are dev-only — do not expose this stack to the public internet without a real reverse proxy + secret rotation.
    zh: |
      README 同时指向 SaaS（ai.quantdinger.com）、AWS Marketplace AMI 和付费分级 —— 开源版和商业版有重叠，要看清楚哪些能力是付费版的。多 broker 不是同质：MetaTrader5 设计上是 Windows-only（Python 包只发 Windows wheel），Linux 服务器跑不了外汇，得单独起一台 Windows 跑 MT5。默认 postgres 密码 quantdinger123 + 127.0.0.1 端口绑定只够开发用 —— 别裸暴公网，要在前面加反代和密钥轮换。
